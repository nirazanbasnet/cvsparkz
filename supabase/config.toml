# Supabase local config. Run `supabase start` then `supabase db reset`.
project_id = "career-ops-cloud"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
# Credentials come from the environment so they're never committed. Set them
# before `supabase start` (e.g. in a gitignored `supabase/.env`, then
# `set -a; source supabase/.env; set +a; supabase start`). See docs/GOOGLE_AUTH.md.
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
# Local callback Supabase exposes for the OAuth round-trip:
# http://127.0.0.1:54321/auth/v1/callback  (add this URI in Google Cloud)

[auth.external.github]
enabled = false
client_id = ""
secret = ""

[storage]
enabled = true
file_size_limit = "10MiB"
